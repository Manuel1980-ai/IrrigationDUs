    const { useState, useEffect, useRef } = React;

    const KEY_SESSIONS = "uniformidad_sessions_v3";
    const KEY_LANG = "uniformidad_lang_v1";
    function loadSessions() { try { return JSON.parse(localStorage.getItem(KEY_SESSIONS)||"[]"); } catch { return []; } }
    function saveSessions(s) { try { localStorage.setItem(KEY_SESSIONS,JSON.stringify(s)); } catch {} }
    function loadLang() { try { return localStorage.getItem(KEY_LANG)||"es"; } catch { return "es"; } }
    function saveLang(l) { try { localStorage.setItem(KEY_LANG,l); } catch {} }
    function fmtDate(iso) {
      const d=new Date(iso);
      return d.toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"})+" "+d.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});
    }
    function fmtCoord(n) { return n.toFixed(6); }
    function mapsLink(lat,lng) { return `https://www.google.com/maps?q=${lat},${lng}`; }
    function earthLink(lat,lng) { return `https://earth.google.com/web/@${lat},${lng},100a,500d`; }

    // ── KML Export ────────────────────────────────────────────────────────────
    function generateKML(session) {
      const pts = session.readings.map((v,i)=>({
        v, i, gps: session.gps[i],
        flow: session.gps[i] ? toFlowStatic(v, session.sistCaudal, session.duracion) : null
      })).filter(p=>p.gps);
      if (!pts.length) return null;
      const placemarks = pts.map(p=>`
    <Placemark>
      <name>Captador #${p.i+1}</name>
      <description><![CDATA[
        <b>Campo:</b> ${session.field||"—"}<br/>
        <b>Sector:</b> ${session.sector||"—"}<br/>
        <b>Emisor:</b> ${session.emisor||"—"}<br/>
        <b>Lámina:</b> ${p.v} ${session.unidad}<br/>
        <b>Caudal:</b> ${p.flow!==null?p.flow.toFixed(2):"—"} ${session.sistCaudal}<br/>
        <b>DU:</b> ${session.results.du.toFixed(1)}% | <b>CV:</b> ${session.results.cv.toFixed(1)}%<br/>
        <b>Fecha:</b> ${fmtDate(session.date)}
      ]]></description>
      <Style><IconStyle><color>ff2196F3</color><scale>1.2</scale>
        <Icon><href>https://maps.google.com/mapfiles/kml/paddle/wht-blank.png</href></Icon>
      </IconStyle></Style>
      <Point><coordinates>${p.gps.lng},${p.gps.lat},0</coordinates></Point>
    </Placemark>`).join("");
      return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>${session.field||"Uniformidad"} – ${fmtDate(session.date)}</name>
    <description>DU: ${session.results.du.toFixed(1)}% | CV: ${session.results.cv.toFixed(1)}% | n=${session.results.n}</description>
    ${placemarks}
  </Document>
</kml>`;
    }

    // ── CSV Export ────────────────────────────────────────────────────────────
    function generateCSV(session) {
      const rows = [["Captador","Lamina_"+session.unidad,"Caudal_"+session.sistCaudal,"Latitud","Longitud","Maps_Link","DU_%","CV_%","Campo","Sector","Emisor","Duracion_min","Fecha"]];
      session.readings.forEach((v,i)=>{
        const gps = session.gps[i];
        const flow = toFlowStatic(v, session.sistCaudal, session.duracion);
        rows.push([
          i+1, v||"",
          flow!==null?flow.toFixed(3):"",
          gps?fmtCoord(gps.lat):"", gps?fmtCoord(gps.lng):"",
          gps?mapsLink(gps.lat,gps.lng):"",
          session.results.du.toFixed(1), session.results.cv.toFixed(1),
          session.field||"", session.sector||"", session.emisor||"",
          session.duracion||"", fmtDate(session.date)
        ]);
      });
      return rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    }

    function toFlowStatic(depth, sistCaudal, duracion) {
      const d=parseFloat(depth), dur=parseFloat(duracion)||60;
      if (isNaN(d)||d<0) return null;
      return sistCaudal==="LPH" ? d*60/dur/1000 : d*60/dur/128;
    }

    function downloadFile(content, filename, mime) {
      const blob = new Blob([content],{type:mime});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href=url; a.download=filename; a.click();
      URL.revokeObjectURL(url);
    }

        hSteps:["开始前测量系统压力。","沿灌溉支管线性放置集水器。","在发射器之间均匀分布。","以正常压力运行系统30–60分钟。","测量每个集水器中收集的体积。","点击📍按钮保存每个集水器的GPS位置。","输入读数并保存本次测量。","在不同支管上重复进行。"],
        hRows:[{cat:"优秀",du:"≥ 90%",cv:"≤ 10%",color:"#166534",bg:"#dcfce7"},{cat:"良好",du:"80–90%",cv:"10–20%",color:"#1d4ed8",bg:"#dbeafe"},{cat:"可接受",du:"70–80%",cv:"20–30%",color:"#92400e",bg:"#fef3c7"},{cat:"不合格",du:"< 70%",cv:"> 30%",color:"#991b1b",bg:"#fee2e2"}],
      },
    };

    const LANG_OPTIONS=[{key:"es",label:"ES"},{key:"en",label:"EN"},{key:"fr",label:"FR"},{key:"de",label:"DE"},{key:"zh",label:"中文"}];

    function calcAll(values) {
      const n=values.length; if(n<2)return null;
      const mean=values.reduce((a,b)=>a+b,0)/n; if(mean===0)return null;
      const sorted=[...values].sort((a,b)=>a-b);
      const q25=Math.max(1,Math.floor(n*0.25));
      const meanLow=sorted.slice(0,q25).reduce((a,b)=>a+b,0)/q25;
      const du=(meanLow/mean)*100;
      const variance=values.reduce((a,v)=>a+Math.pow(v-mean,2),0)/(n-1);
      const sd=Math.sqrt(variance);
      const cv=(sd/mean)*100;
      return {du,cv,mean,sd,n,min:sorted[0],max:sorted[n-1],q25};
    }

    function rating(val,type,t) {
      if(type==="cv"){
        if(val<=10)return{label:t.rExc,color:"#166534",bg:"#dcfce7",border:"#86efac"};
        if(val<=20)return{label:t.rGood,color:"#1d4ed8",bg:"#dbeafe",border:"#93c5fd"};
        if(val<=30)return{label:t.rAcc,color:"#92400e",bg:"#fef3c7",border:"#fcd34d"};
        return{label:t.rDef,color:"#991b1b",bg:"#fee2e2",border:"#fca5a5"};
      }else{
        if(val>=90)return{label:t.rExc,color:"#166534",bg:"#dcfce7",border:"#86efac"};
        if(val>=80)return{label:t.rGood,color:"#1d4ed8",bg:"#dbeafe",border:"#93c5fd"};
        if(val>=70)return{label:t.rAcc,color:"#92400e",bg:"#fef3c7",border:"#fcd34d"};
        return{label:t.rDef,color:"#991b1b",bg:"#fee2e2",border:"#fca5a5"};
      }
    }

        setGpsStatus(s=>{const next=Array(numCans).fill("none");s.forEach((v,i)=>{if(i<numCans)next[i]=v;});return next;});
        setSaved(false);
      },[numCans]);

        if(!navigator.geolocation){setGpsStatus(s=>{const n=[...s];n[i]="error";return n;});return;}
        setGpsStatus(s=>{const n=[...s];n[i]="loading";return n;});
        navigator.geolocation.getCurrentPosition(
          pos=>{
            const {latitude:lat,longitude:lng,accuracy:acc}=pos.coords;
            setGps(g=>{const n=[...g];n[i]={lat,lng,acc};return n;});
            setGpsStatus(s=>{const n=[...s];n[i]="ok";return n;});
            setSaved(false);

                    {/* GPS button */}
                    <button style={c.gpsBtn(st)} onClick={()=>st==="ok"?clearGPS(i):captureGPS(i)} title={st==="ok"?g.lat.toFixed(5)+", "+g.lng.toFixed(5):t.colGPS}>
                      {st==="loading"?"⏳":st==="ok"?"📍":st==="error"?"⚠️":"📍"}
                    </button>
                  </div>
                  {/* GPS info row */}
                  {g&&(
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3,paddingLeft:41}}>
                      <span style={{fontSize:10,color:"#6b7280",fontWeight:600}}>
                        {fmtCoord(g.lat)}, {fmtCoord(g.lng)}
                        {g.acc&&<span style={{color:"#94a3b8"}}> ±{Math.round(g.acc)}m</span>}
                      </span>
                      <a href={mapsLink(g.lat,g.lng)} target="_blank" style={c.mapLink}>{t.viewMaps}</a>
                      <a href={earthLink(g.lat,g.lng)} target="_blank" style={{...c.mapLink,background:"#f0fdf4",borderColor:"#86efac",color:"#166534"}}>{t.viewEarth}</a>
                    </div>
                  )}
                </div>
              );
            })}

            <div style={{marginTop:8,background:"#f0fdf4",borderRadius:10,padding:"8px 12px",fontSize:11,color:"#6b7280",fontWeight:600}}>
              {t.medCount(flowValues.length,numCans)}{t.fFormula(duracion||60)}
              {flowValues.length>=2&&results&&<span style={{color:"#16a34a",marginLeft:4}}>{t.fAvg} {results.mean.toFixed(2)} {sistCaudal}</span>}
            </div>
          </div>

          {results&&(<div>
            <div style={{fontSize:12,fontWeight:700,color:"#6b7280",marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>{t.resTitle(flowValues.length)}</div>
            {hasDiseño&&(()=>{
              const ef=(results.mean/caudalNum)*100;
              const rEf=ef>=90?{label:t.rEfficient,color:"#166534",bg:"#dcfce7",border:"#86efac"}:ef>=80?{label:t.rAcceptable,color:"#1d4ed8",bg:"#dbeafe",border:"#93c5fd"}:ef>=70?{label:t.rLow,color:"#92400e",bg:"#fef3c7",border:"#fcd34d"}:{label:t.rPoor,color:"#991b1b",bg:"#fee2e2",border:"#fca5a5"};
              const diff=results.mean-caudalNum;
              return(<div style={{background:rEf.bg,border:`1.5px solid ${rEf.border}`,borderRadius:14,padding:"14px 16px",marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:8}}>{t.vsDesign}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
                  {[{l:t.bDesign,v:caudalNum.toFixed(2),c:"#374151"},{l:t.bMeasured,v:results.mean.toFixed(2),c:rEf.color},{l:t.bEff,v:`${ef.toFixed(1)}%`,c:rEf.color}].map(s=>(
                    <div key={s.l} style={{background:"rgba(255,255,255,0.6)",borderRadius:10,padding:"8px 6px",textAlign:"center"}}>
                      <div style={{fontSize:16,fontWeight:900,color:s.c}}>{s.v}</div>
                      <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,marginTop:2}}>{s.l}</div>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:12,fontWeight:700,color:rEf.color,marginBottom:6}}>{diff>0?`+${diff.toFixed(2)}`:diff.toFixed(2)} {sistCaudal} · {rEf.label}</div>
                <div style={{fontSize:11,fontWeight:700,color:"#6b7280",marginBottom:4}}>{t.devTitle}</div>
                {readings.map((v,i)=>{
                  const f=toFlow(v);if(f===null)return null;
                  const dev=(f-caudalNum)/caudalNum*100,isOver=dev>=0;
                  return(<div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#6b7280",width:24,flexShrink:0}}>#{i+1}</span>
                    <span style={{fontSize:11,fontWeight:800,color:"#1e3a8a",width:44,textAlign:"right",flexShrink:0}}>{f.toFixed(2)}</span>
                    <div style={{flex:1,height:8,background:"rgba(0,0,0,0.08)",borderRadius:4,position:"relative"}}>
                      <div style={{position:"absolute",left:isOver?"50%":`${Math.max(0,50+dev/2)}%`,width:`${Math.min(50,Math.abs(dev)/2)}%`,height:"100%",borderRadius:4,background:isOver?"#16a34a":"#ef4444"}}/>
                      <div style={{position:"absolute",left:"50%",top:-2,width:2,height:12,background:"rgba(0,0,0,0.2)",borderRadius:1}}/>
                    </div>
                    <span style={{fontSize:11,fontWeight:800,color:isOver?"#16a34a":"#ef4444",width:42,textAlign:"right",flexShrink:0}}>{isOver?"+":""}{dev.toFixed(1)}%</span>
                    {gps[i]&&<span style={{fontSize:11}}>📍</span>}
                  </div>);
                })}
              </div>);
            })()}
            <CoefBar label={t.duLabel} value={results.du} type="du" desc={t.duDesc(results.q25)}/>
            <CoefBar label={t.cvLabel} value={results.cv} type="cv" desc={t.cvDesc}/>
            <div style={c.card}>
              <div style={c.lbl}>{t.statsTitle} ({sistCaudal})</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
                {[{l:"Min",v:results.min.toFixed(2)},{l:"Max",v:results.max.toFixed(2)},{l:"μ",v:results.mean.toFixed(2)},{l:"σ",v:results.sd.toFixed(2)}].map(s=>(
                  <div key={s.l} style={c.statBox}><div style={{fontSize:16,fontWeight:900,color:"#1e3a8a"}}>{s.v}</div><div style={{fontSize:10,color:"#94a3b8",fontWeight:700}}>{s.l}</div></div>
                ))}
              </div>
            </div>
          </div>)}

          {!results&&flowValues.length<2&&<div style={{textAlign:"center",padding:"20px",color:"#94a3b8",fontWeight:600}}>{t.minReadings}</div>}
          <button style={c.saveBtn(!!results&&!saved)} onClick={saveSession} disabled={!results||saved}>{saved?t.sSaved:t.sSave}</button>
          <button style={c.rstBtn} onClick={resetForm}>{t.sClear}</button>
        </div>
      );

      // ── Historial ─────────────────────────────────────────────────────────
      const histView=(
        <div style={c.body}>
          {sessions.length===0?(
            <div style={c.empty}><div style={{fontSize:40,marginBottom:12}}>💧</div><div style={{fontWeight:700,fontSize:16}}>{t.emptyHist}</div><div style={{fontSize:14,marginTop:4}}>{t.emptyHistSub}</div></div>
          ):sessions.map(s=>{
            const sT=LANGS[s.lang]||LANGS.es,r=s.results;
            const rDu=rating(r.du,"du",sT),rCv=rating(r.cv,"cv",sT);
            const sGps=(s.gps||[]).filter(Boolean);
            return(<div key={s.id} style={c.histCard}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:"#9ca3af",fontWeight:600}}>{fmtDate(s.date)}</div>
                  <div style={{fontWeight:800,color:"#1d4ed8",fontSize:15,margin:"2px 0 4px"}}>{[s.field,s.sector].filter(Boolean).join(" · ")||"—"}</div>
                  <div style={{fontSize:12,color:"#6b7280",fontWeight:600,marginBottom:8}}>
                    {[s.emisor,`${s.numCans} pts`,s.unidad,s.duracion&&`${s.duracion} min`].filter(Boolean).join(" · ")}
                    {s.caudal&&!isNaN(parseFloat(s.caudal))&&<span> · <span style={{color:"#3b82f6",fontWeight:700}}>{parseFloat(s.caudal).toFixed(2)} {s.sistCaudal}</span></span>}
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
                    <span style={c.pill(rDu)}>DU {r.du.toFixed(1)}%</span>
                    <span style={c.pill(rCv)}>CV {r.cv.toFixed(1)}%</span>
                    {sGps.length>0&&<span style={{...c.pill({color:"#dc2626",bg:"#fee2e2",border:"#fca5a5"})}}>📍 {sT.gpsPoints(sGps.length)}</span>}
                  </div>
                  <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:sGps.length>0?8:0}}>μ {r.mean.toFixed(2)} {s.sistCaudal} · σ {r.sd.toFixed(2)} · n={r.n}</div>

                  {/* GPS points list */}
                  {sGps.length>0&&(
                    <div style={{background:"#f8fafc",borderRadius:10,padding:"8px 10px",marginBottom:8}}>
                      {(s.gps||[]).map((g,i)=>g?(
                        <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                          <span style={{fontSize:11,fontWeight:800,color:"#ef4444",width:24}}>#{i+1}</span>
                          <span style={{fontSize:10,color:"#6b7280",fontWeight:600,flex:1}}>{fmtCoord(g.lat)}, {fmtCoord(g.lng)}</span>
                          <a href={mapsLink(g.lat,g.lng)} target="_blank" style={c.mapLink}>{sT.viewMaps}</a>
                          <a href={earthLink(g.lat,g.lng)} target="_blank" style={{...c.mapLink,background:"#f0fdf4",borderColor:"#86efac",color:"#166534"}}>{sT.viewEarth}</a>
                        </div>
                      ):null)}
                    </div>
                  )}

                  {/* Export buttons */}
                  <div style={{display:"flex",gap:8}}>
                    <button style={c.exportBtn} onClick={()=>handleExportKML(s)}>
                      🌍 {sT.exportKML}
                    </button>
                    <button style={{...c.exportBtn,background:"#f0fdf4",borderColor:"#86efac",color:"#166534"}} onClick={()=>handleExportCSV(s)}>
                      📊 {sT.exportCSV}
                    </button>
                  </div>
                </div>
                <button style={c.delBtn} onClick={()=>deleteSession(s.id)}>×</button>
              </div>
            </div>);
          })}
        </div>
      );

      // ── Ayuda ─────────────────────────────────────────────────────────────
      const helpView=(
        <div style={c.body}>
          <div style={c.card}>
            <div style={{fontWeight:800,fontSize:15,color:"#1d4ed8",marginBottom:10}}>{t.hCoefs}</div>
            {[{name:t.hDuName,formula:t.hDuFormula,desc:t.hDuDesc},{name:t.hCvName,formula:t.hCvFormula,desc:t.hCvDesc}].map(f=>(
              <div key={f.name} style={{marginBottom:14,paddingBottom:14,borderBottom:"1px solid #e5e7eb"}}>
                <div style={{fontWeight:800,fontSize:14,color:"#374151"}}>{f.name}</div>
                <div style={{fontFamily:"monospace",background:"#f1f5f9",borderRadius:8,padding:"6px 10px",fontSize:13,color:"#0f172a",margin:"4px 0",fontWeight:600}}>{f.formula}</div>
                <div style={{fontSize:13,color:"#6b7280",fontWeight:600}}>{f.desc}</div>
              </div>
            ))}
          </div>
          <div style={c.card}>
            <div style={{fontWeight:800,fontSize:15,color:"#1d4ed8",marginBottom:8}}>{t.hClass}</div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#f1f5f9"}}>
                <th style={{padding:"8px 10px",textAlign:"left",color:"#374151",fontWeight:800}}>{t.hCat}</th>
                <th style={{padding:"8px 10px",textAlign:"center",color:"#374151",fontWeight:800}}>{t.hDu}</th>
                <th style={{padding:"8px 10px",textAlign:"center",color:"#374151",fontWeight:800}}>{t.hCv}</th>
              </tr></thead>
              <tbody>{t.hRows.map(row=>(
                <tr key={row.cat} style={{background:row.bg}}>
                  <td style={{padding:"8px 10px",fontWeight:800,color:row.color}}>{row.cat}</td>
                  <td style={{padding:"8px 10px",textAlign:"center",fontWeight:700,color:row.color}}>{row.du}</td>
                  <td style={{padding:"8px 10px",textAlign:"center",fontWeight:700,color:row.color}}>{row.cv}</td>
                </tr>
              ))}</tbody>
            </table>
            <div style={{fontSize:11,color:"#94a3b8",marginTop:8,fontWeight:600}}>{t.hRef}</div>
          </div>
          <div style={c.card}>
            <div style={{fontWeight:800,fontSize:15,color:"#1d4ed8",marginBottom:8}}>{t.hProtocol}</div>
            {t.hSteps.map((s,i)=>(
              <div key={i} style={{display:"flex",gap:10,marginBottom:8}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:"#eff6ff",color:"#1d4ed8",fontWeight:800,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div>
                <div style={{fontSize:13,color:"#374151",fontWeight:600,paddingTop:3}}>{s}</div>
              </div>
            ))}
          </div>
        </div>
      );

      return(
        <div style={c.wrap}>
          <div style={c.header}>
            <div style={c.hRow}>
              <div style={c.logo}><DropIcon size={36}/><span style={c.title}>{t.appTitle}</span></div>
              <div style={c.langArea}>
                <button style={c.langBtn} onClick={()=>setShowLang(v=>!v)}>{LANG_OPTIONS.find(l=>l.key===lang)?.label} ▾</button>
                {showLang&&<div style={c.langDrop}>{LANG_OPTIONS.map(l=><button key={l.key} style={c.langOpt(lang===l.key)} onClick={()=>changeLang(l.key)}>{l.label}</button>)}</div>}
              </div>
            </div>
          </div>
          <div style={c.tabs}>
            <button style={c.tab(tab==="med")}  onClick={()=>setTab("med")}>{t.tabs.med}</button>
            <button style={c.tab(tab==="hist")} onClick={()=>setTab("hist")}>{t.tabs.hist}{sessions.length>0?` (${sessions.length})`:""}</button>
            <button style={c.tab(tab==="help")} onClick={()=>setTab("help")}>{t.tabs.help}</button>
          </div>
          {tab==="med"  && medView}
          {tab==="hist" && histView}
          {tab==="help" && helpView}
          <div style={{textAlign:"right",padding:"8px 16px 16px",fontSize:11,color:"#94a3b8",fontWeight:700,letterSpacing:0.3}}>by Zenit</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
